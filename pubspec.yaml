name: publicaid
description: Find help near you — social services directory
publish_to: 'none'
version: 1.0.0+100

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Network
  http: ^1.3.0

  # Local storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Auth
  local_auth: ^2.3.0

  # Location
  geolocator: ^14.0.0

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  crypto: ^3.0.6
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  firebase_crashlytics: ^5.0.8
  pointycastle: ^4.0.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: InstrumentSerif
      fonts:
        - asset: assets/fonts/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/InstrumentSerif-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
